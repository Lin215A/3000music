<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>灵动岛 · 音乐播放器</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --island-bg: #000;
      --accent: #fc3c44;
      --text: #fff;
      --text-dim: rgba(255,255,255,0.55);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
      color: var(--text);
      padding: 20px;
    }

    .dynamic-island {
      background: var(--island-bg);
      border-radius: 36px;
      overflow: hidden;
      cursor: pointer;
      transition:
        width 0.55s cubic-bezier(0.32, 0.72, 0, 1),
        height 0.55s cubic-bezier(0.32, 0.72, 0, 1),
        border-radius 0.55s cubic-bezier(0.32, 0.72, 0, 1);
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      position: relative;
    }

    .dynamic-island[data-state="idle"] {
      width: 126px;
      height: 37px;
      border-radius: 20px;
    }

    .dynamic-island[data-state="compact"] {
      width: 300px;
      height: 37px;
      border-radius: 20px;
    }

    .dynamic-island[data-state="expanded"] {
      width: 360px;
      height: 200px;
      border-radius: 44px;
    }

    .island-view {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    .dynamic-island[data-state="idle"] .view-idle,
    .dynamic-island[data-state="compact"] .view-compact,
    .dynamic-island[data-state="expanded"] .view-expanded {
      opacity: 1;
      pointer-events: auto;
    }

    /* Idle */
    .view-idle {
      justify-content: center;
      gap: 6px;
    }

    .idle-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
    }

    .idle-dot.center {
      width: 6px;
      height: 6px;
      background: var(--accent);
    }

    /* Compact */
    .view-compact {
      padding: 0 12px;
      gap: 10px;
    }

    .compact-art {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      flex-shrink: 0;
      overflow: hidden;
      background: linear-gradient(135deg, #3d2b1f, #1a1209);
    }

    .compact-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .compact-info {
      flex: 1;
      overflow: hidden;
      min-width: 0;
    }

    .compact-title {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      animation: marquee 8s linear infinite;
    }

    @keyframes marquee {
      0%, 15% { transform: translateX(0); }
      85%, 100% { transform: translateX(calc(-100% + 180px)); }
    }

    .compact-wave {
      display: flex;
      align-items: center;
      gap: 2px;
      height: 16px;
      flex-shrink: 0;
    }

    .compact-wave span {
      width: 2px;
      background: var(--accent);
      border-radius: 1px;
      animation: wave 0.8s ease-in-out infinite alternate;
    }

    .compact-wave span:nth-child(1) { height: 6px; animation-delay: 0s; }
    .compact-wave span:nth-child(2) { height: 12px; animation-delay: 0.15s; }
    .compact-wave span:nth-child(3) { height: 8px; animation-delay: 0.3s; }
    .compact-wave span:nth-child(4) { height: 14px; animation-delay: 0.1s; }

    .compact-wave.paused span {
      animation-play-state: paused;
      height: 4px !important;
    }

    @keyframes wave {
      from { transform: scaleY(0.4); }
      to { transform: scaleY(1); }
    }

    /* Expanded */
    .view-expanded {
      flex-direction: column;
      padding: 20px 24px 18px;
      align-items: stretch;
      justify-content: flex-start;
    }

    .expanded-top {
      display: flex;
      gap: 14px;
      align-items: center;
      margin-bottom: 16px;
    }

    .expanded-art {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      flex-shrink: 0;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      background: linear-gradient(135deg, #3d2b1f, #1a1209);
    }

    .expanded-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .expanded-meta {
      flex: 1;
      min-width: 0;
    }

    .expanded-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .expanded-artist {
      font-size: 13px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .airplay-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: none;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .progress-wrap { margin-bottom: 14px; }

    .progress-bar {
      height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      cursor: pointer;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--text);
      border-radius: 2px;
      width: 0%;
      transition: width 0.1s linear;
    }

    .progress-times {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 11px;
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      transition: transform 0.15s;
    }

    .ctrl-btn:active { transform: scale(0.88); }
    .ctrl-btn.secondary { color: var(--text-dim); }

    .ctrl-btn.play {
      width: 44px;
      height: 44px;
      background: var(--text);
      color: #000;
      border-radius: 50%;
    }

    .ctrl-btn.play svg { margin-left: 2px; }
  </style>
</head>
<body>

  <div class="dynamic-island" id="island" data-state="idle">

    <div class="island-view view-idle">
      <span class="idle-dot"></span>
      <span class="idle-dot center"></span>
      <span class="idle-dot"></span>
    </div>

    <div class="island-view view-compact">
      <div class="compact-art">
        <img src="cover.png" alt="封面" onerror="this.style.display='none'">
      </div>
      <div class="compact-info">
        <div class="compact-title">三千年前 — 关淑怡 / 李香琴</div>
      </div>
      <div class="compact-wave" id="compactWave">
        <span></span><span></span><span></span><span></span>
      </div>
    </div>

    <div class="island-view view-expanded">
      <div class="expanded-top">
        <div class="expanded-art">
          <img src="cover.png" alt="封面" onerror="this.style.display='none'">
        </div>
        <div class="expanded-meta">
          <div class="expanded-title">三千年前</div>
          <div class="expanded-artist">关淑怡 / 李香琴</div>
        </div>
        <button class="airplay-btn" aria-label="AirPlay">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 22h12l-6-6z"/><path d="M18 16V5a2 2 0 00-2-2H8a2 2 0 00-2 2v11h12z" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
      </div>

      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-times">
          <span id="timeCurrent">0:00</span>
          <span id="timeTotal">0:00</span>
        </div>
      </div>

      <div class="controls">
        <button class="ctrl-btn secondary" id="btnPrev" aria-label="上一首">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button class="ctrl-btn play" id="btnPlay" aria-label="播放">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" id="playIcon">
            <path d="M8 5v14l11-7z"/>
          </svg>
        </button>
        <button class="ctrl-btn secondary" id="btnNext" aria-label="下一首">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2.5-6l8.5 6V6z"/></svg>
        </button>
      </div>
    </div>

  </div>

  <audio id="audio" preload="auto" src="三千年前.mp3"></audio>

  <script>
    const island = document.getElementById('island');
    const audio = document.getElementById('audio');
    const btnPlay = document.getElementById('btnPlay');
    const playIcon = document.getElementById('playIcon');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const timeCurrent = document.getElementById('timeCurrent');
    const timeTotal = document.getElementById('timeTotal');
    const compactWave = document.getElementById('compactWave');

    let state = 'idle';
    let isPlaying = false;

    const playPath = 'M8 5v14l11-7z';
    const pausePath = 'M6 19h4V5H6v14zm8-14v14h4V5h-4z';

    function formatTime(s) {
      if (!s || isNaN(s)) return '0:00';
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2, '0')}`;
    }

    function setState(next) {
      state = next;
      island.dataset.state = next;
    }

    function updatePlayUI(playing) {
      isPlaying = playing;
      playIcon.innerHTML = `<path d="${playing ? pausePath : playPath}"/>`;
      compactWave.classList.toggle('paused', !playing);
    }

    island.addEventListener('click', (e) => {
      e.stopPropagation();
      if (state === 'idle') {
        setState('compact');
        audio.play().then(() => updatePlayUI(true)).catch(() => {});
      } else if (state === 'compact') {
        setState('expanded');
      } else {
        setState('compact');
      }
    });

    document.addEventListener('click', (e) => {
      if (!island.contains(e.target)) {
        if (state === 'expanded') setState('compact');
        else if (state === 'compact' && !isPlaying) setState('idle');
      }
    });

    btnPlay.addEventListener('click', (e) => {
      e.stopPropagation();
      if (isPlaying) {
        audio.pause();
        updatePlayUI(false);
      } else {
        audio.play().then(() => {
          updatePlayUI(true);
          if (state === 'idle') setState('compact');
        }).catch(() => {});
      }
    });

    document.getElementById('btnPrev').addEventListener('click', (e) => {
      e.stopPropagation();
      audio.currentTime = 0;
    });

    document.getElementById('btnNext').addEventListener('click', (e) => {
      e.stopPropagation();
      audio.currentTime = 0;
    });

    audio.addEventListener('loadedmetadata', () => {
      timeTotal.textContent = formatTime(audio.duration);
    });

    audio.addEventListener('timeupdate', () => {
      const pct = (audio.currentTime / audio.duration) * 100 || 0;
      progressFill.style.width = pct + '%';
      timeCurrent.textContent = formatTime(audio.currentTime);
    });

    audio.addEventListener('ended', () => {
      updatePlayUI(false);
      setState('idle');
    });

    progressBar.addEventListener('click', (e) => {
      e.stopPropagation();
      const rect = progressBar.getBoundingClientRect();
      audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
    });
  </script>
</body>
</html>
